<p>Il portavoce del Dipartimento di Stato ha dichiarato che i colloqui hanno affrontato le questioni relative al livello di arricchimento dell'uranio e alle modalità di verifica internazionale. Nessun dettaglio è stato fornito sui punti di disaccordo specifici.</p>

function renderFeed(threadKey) {
  const feedView = document.getElementById('feed-view');
  const articleView = document.getElementById('article-view');
  feedView.style.display = 'block';
  articleView.style.display = 'none';
  feedView.className = 'fade-in';

  const list = document.getElementById('news-list');
  list.innerHTML = '';

  news.forEach(item => {
    const el = document.createElement('div');
    el.className = 'news-item';
    el.innerHTML = `
      <div class="news-meta">
        <span class="source-tag">${item.source}</span>
        <span class="meta-dot">·</span>
        <span class="news-time">${item.time}</span>
      </div>
      <div class="news-title">${item.title}</div>
      <div class="news-summary">${item.summary}</div>
      <div class="news-footer">
        <span class="news-stat">${comments[item.id] ? comments[item.id].length : 0} commenti</span>
        <span class="news-stat">${item.reads} letture</span>
        <span class="news-link-hint">apri →</span>
      </div>
    `;
    el.addEventListener('click', () => renderArticle(item.id));
    list.appendChild(el);
  });
}

function renderArticle(id) {
  const item = news[id];
  const feedView = document.getElementById('feed-view');
  const articleView = document.getElementById('article-view');
  feedView.style.display = 'none';
  articleView.style.display = 'block';
  articleView.className = 'article-view fade-in';

  const itemComments = comments[id] || [];

  const commentsHTML = itemComments.map(c => `
    <div class="comment">
      <div class="comment-avatar" style="background:${c.bg};color:${c.tc};font-size:10px;font-family:'DM Mono',monospace;font-weight:400;">${c.initials}</div>
      <div class="comment-body">
        <div class="comment-header">
          <span class="comment-user">${c.user}</span>
          <span class="comment-verified">✓ id verificata</span>
          <span class="comment-time">${c.time}</span>
        </div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-actions">
          <button class="c-action">▲ ${c.upvotes}</button>
          <button class="c-action">↩ rispondi</button>
        </div>
        ${c.replies && c.replies.length ? `
          <div class="reply-block">
            ${c.replies.map(r => `
              <div class="comment" style="padding:12px 0;border-bottom:none;">
                <div class="comment-avatar" style="background:${r.bg};color:${r.tc};font-size:10px;font-family:'DM Mono',monospace;font-weight:400;width:24px;height:24px;">${r.initials}</div>
                <div class="comment-body">
                  <div class="comment-header">
                    <span class="comment-user">${r.user}</span>
                    <span class="comment-verified">✓ id verificata</span>
                    <span class="comment-time">${r.time}</span>
                  </div>
                  <div class="comment-text">${r.text}</div>
                  <div class="comment-actions">
                    <button class="c-action">▲ ${r.upvotes}</button>
                    <button class="c-action">↩ rispondi</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `).join('');

  articleView.innerHTML = `
    <div class="back-row" id="back-btn">← torna al thread</div>

    <div class="article-source-row">
      <span class="source-tag">${item.source}</span>
      <span class="article-thread-tag">Iran · USA · Israele</span>
    </div>

    <h1 class="article-title">${item.title}</h1>
    <div class="article-dateline">${item.time}</div>

    <div class="article-rule"></div>

    <div class="ai-label">sintesi — generata da AI, senza inferenze editoriali</div>
    <div class="article-body">${item.body}</div>

    <div class="source-block">
      <div class="source-block-left">
        <strong>${item.source_full}</strong>
        fonte primaria originale
      </div>
      <a class="source-link" href="${item.url}" target="_blank">leggi la fonte ↗</a>
    </div>

    <div class="comments-header">
      <div class="comments-title">${itemComments.length} commenti</div>
      <div class="comments-policy">solo utenti con id verificata</div>
    </div>

    <div class="comment-compose">
      <div class="comment-avatar" style="background:#e6eeea;color:#2c3e35;font-size:10px;font-family:'DM Mono',monospace;font-weight:400;">RM</div>
      <div class="compose-right">
        <textarea placeholder="Scrivi un commento basato sui fatti..."></textarea>
        <div class="compose-footer">
          <span class="compose-note">la tua identità è verificata · il commento è pubblico</span>
          <button class="post-btn">pubblica</button>
        </div>
      </div>
    </div>

    ${commentsHTML}
  `;

  document.getElementById('back-btn').addEventListener('click', () => renderFeed('iran'));
  document.getElementById('main-area').scrollTop = 0;
}
